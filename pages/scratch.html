<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCRATCH</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    const canvas = document.createElement('canvas');
    document.body.prepend(canvas)

    const ctx = canvas.getContext('2d');

    const width = window.innerWidth;
    const height = window.innerHeight;

    // Handle high-DPI screens
    const scale = window.devicePixelRatio;

    canvas.width = width * scale;
    canvas.height = height * scale;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';


    ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";  
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2)
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height)
    ctx.stroke();

    const radius = 100;
    const diameter = radius * 2
    const angle = Math.PI / 180;

    const x = canvas.width / 4;
    const y = canvas.height / 4;
    
    const w = canvas.width;
    const h = canvas.height / 2;

    const maxX = x + w / 2;
    const maxY = y + h;

    
    ctx.fillRect(x, y, w / 2, canvas.height / 2)

    ctx.strokeStyle = "rgba(0, 0, 90, 0.5)";  
    ctx.lineWidth = 1;
    ctx.beginPath();
    // ctx.moveTo(x,y,maxX, maxY);
    // RADIUS TOP-RIGHT
    ctx.arc(maxX - radius, y + radius , radius, angle * 270, angle, false)
    // RADIUS BOTTOM-RIGHT
    ctx.arc(maxX - radius, y + h - radius , radius, 0,  angle * 90, false)
    // RADIUS BOTTOM-LEFT
    ctx.arc(x + radius, y + h - radius , radius,  angle * 90, angle * 180, false)
    // RADIUS TOP-LEFT
    ctx.arc(x + radius, y + radius , radius, angle * 180, angle * 270, false)
    ctx.closePath();

    // ctx.beginPath();
    // ctx.arch()
    ctx.stroke();

    
  </script>
</body>
</html>
