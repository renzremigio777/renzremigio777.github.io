<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betzone - Baccarat 1</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

<body >
  <div id="loading-overlay" class="loader" style="display: none;">
    <svg width="100" height="100">
      <defs>
        
        <lineargradient id="lineargradient2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#49a1ff"></stop>
          <stop offset="100%" stop-color="#fff"></stop>
        </lineargradient>
      </defs>
      <g>
        <text x="0" y="19" font-size="22" font-weight="900" >BET</text>
        <text x="42" y="19" font-size="22" font-weight="900">ZONE</text>
      </g>
      <g>
        <rect id="progress" x="0" y="21"  width="0" height="3" fill="#49a1ff"/>
        <text id="progress-text" x="50%" y="50" font-size="11" font-weight="100">0%</text>
      </g>
    </svg>
     
  </div>
  <div class="wrapper">

    <video id="video" poster="/assets/images/sample-livestream.png"  controlsList="nodownload nofullscreen noremoteplayback" playsinline webkit-playsinline></video>
    <div class="hud">
      <div class="hud-panel">
        <svg id="beadroad" class="roadmap" preserveAspectRatio="xMidYMid meet" viewBox="0 0 420 120">
        </svg>
      </div>
      <div class="hud-panel">
        <svg id="betting" class="betting" preserveAspectRatio="xMidYMid meet"  viewBox="0 0 420 125">
            <defs>
            
              <lineargradient id="secondary-blue-fill"  x1="50%" y1="0%" x2="50%" y2="100%" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: #054bad; stop-opacity:.8;"></stop>
                <!-- <stop offset="100%" style="stop-color: #113c7c; stop-opacity:.8;"></stop> -->
                <stop offset="100%" style="stop-color: #0d203b; stop-opacity:.8;"></stop>
              </lineargradient>
              <lineargradient id="secondary-blue-stroke" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: #065bd8;stop-opacity: 0.8;"></stop>
                <stop offset="100%" style="stop-color: #0f3d81;stop-opacity: 0.8;"></stop>
              </lineargradient>
              
             
              <!-- RED -->
              <lineargradient id="secondary-red-fill" x1="50%" y1="0%" x2="50%"" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: #8a1313; stop-opacity: 0.8;"></stop>
                <stop offset="100%" style="stop-color: #3e1212; stop-opacity: 0.8;"></stop>
              </lineargradient>
              <lineargradient id="secondary-red-stroke" x1="50%" y1="0%" x2="50%"" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: #d51414; stop-opacity: 0.8;"></stop>
                <stop offset="100%" style="stop-color: #8c1413; stop-opacity: 0.8;"></stop>
              </lineargradient>
              <!-- GREEN -->
              <lineargradient id="secondary-green-fill" x1="50%" y1="0%" x2="50%"" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: #0f661d; stop-opacity: 0.8;"></stop>
                <stop offset="100%" style="stop-color: #163e12; stop-opacity: 0.8;"></stop>
              </lineargradient>
               <lineargradient id="secondary-green-stroke" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: #188d4d;stop-opacity: 0.8;"></stop>
                <stop offset="100%" style="stop-color: #0f812b;stop-opacity: 0.8;"></stop>
              </lineargradient>
              <!-- <lineargradient id="secondary-green-fill" x1="50%" y1="0%" x2="50%"" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(138, 88, 52);"></stop>
                <stop offset="100%" style="stop-color: rgb(109, 67, 37);"></stop>
              </lineargradient>
              <lineargradient id="secondary-green-stroke" x1="50%" y1="0%" x2="50%"" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(138, 88, 52);"></stop>
                <stop offset="100%" style="stop-color: rgb(109, 67, 37);"></stop>
              </lineargradient> -->

            </defs>
            <!-- LEFT -->
            <g class="place-bet" id="p-pair">
              <rect  x="0" y="0" width="100" height="39" rx="3"  fill="url(#secondary-blue-fill)" stroke="url(#secondary-blue-stroke)" class="bet bet-left" />
              <text x="50" y="20" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">P PAIR</text>
            </g>
            <g class="place-bet" id="p-bonus">
              <rect x="0" y="42" width="100" height="39" rx="3"  fill="url(#secondary-blue-fill)" stroke="url(#secondary-blue-stroke)" class="bet bet-left" />
              <text x="50"  y="61.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">P BONUS </text>
            </g>
            <g class="place-bet" id="perfect-pair">
              <rect  x="0" y="84.5" width="100" height= "39" rx="3"  fill="url(#secondary-green-fill)" stroke="url(#secondary-green-stroke)" class="bet bet-left" />
              <text x="50" y="107" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">PERFECT PAIR</text>
            </g>

            <!-- MIDDLE 214-->
            <g class="place-bet" id="player">
              <rect x="103" y="0" width="80" height="124" rx="3"  fill="url(#secondary-blue-fill)" stroke="url(#secondary-blue-stroke)" class="bet bet-left" />
              <text x="143" y="20" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700" fill="#fff">PLAYER</text>
            </g>
            <g class="place-bet" id="tie">
              <rect x="186" y="0" width="47" height="124" rx="3"  fill="url(#secondary-green-fill)" stroke="url(#secondary-green-stroke)" class="bet bet-left" />
              <text x="209" y="20" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700" fill="#fff">TIE</text>
            </g>
            <g class="place-bet" id="banker">
              <rect x="236" y="0" width="80" height="124" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="277" y="20" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700" fill="#fff">BANKER</text>
            </g>

            <!-- RIGHT -->
            <g class="place-bet" id="b-pair">
              <rect x="319" y="0" width="100" height="39" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="371" y="20" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">B PAIR</text>
            </g>
            <g class="place-bet" id="b-bonus">
              <rect x="319" y="42" width="100" height="39" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="371" y="61.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">B BONUS </text>
            </g>
            <g class="place-bet" id="either-pair">
              <rect  x="319" y="84.5" width="100" height= "39" rx="3"  fill="url(#secondary-green-fill)" stroke="url(#secondary-green-stroke)" class="bet bet-left" />
              <text x="371" y="107" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">EITHER PAIR</text>
            </g>
            
             <!-- <g class="place-bet" id="b-pair">
              <rect x="306" y="0" width="100" height="39" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="306" y="20" font-size="11" font-weight="700" fill="#fff">B PAIR</text>
            </g> -->
           
        </svg> 
      </div>
      <div class="hud-panel">
        <svg id="fourroad" class="roadmap" preserveAspectRatio="xMidYMid meet"  viewBox="0 0 420 120">
        </svg>
      </div>
    </div>
    <div class="common-ui">
      <div class="top-gradient"></div>
      <div class="top-left">top-left</div>
      <div class="top-right">
        <div class="top-right-menu">
          <a href="#" class="common-btn"><i class="icon-message"></i></a>

          <a href="#" class="common-btn"><i class="icon-withdraw"></i></a>
        </div>
      </div>
      <div class="bottom-left">
         <div class="bottom-right-menu">
            <a href="#" class="common-btn"><i class="icon-casino"></i></a>
            <a href="#" class="common-btn wallet-data">
              <div>Balance</div>
              <div>PHP 100</div>
            </a>
            <a href="#" class="common-btn wallet-data">
              <div>Total Bet</div>
              <div>PHP 100</div>
            </a>
          </div>
      </div>
      <div class="bottom-right">
        <div class="bottom-right-menu">
          <a href="#" class="common-btn"><i class="icon-casino"></i></a>
          <a href="#" class="common-btn"><i class="icon-deposit"></i><span>Table</span></a>
          <a href="#" class="common-btn"><i class="icon-withdraw"></i><span>Lobby</span></a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="/assets/js/hud.js"></script>
  <script src="/assets/js/main.js"></script>
