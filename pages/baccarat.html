<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betzone - Baccarat 1</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../assets/css/icons.css" />
  <link rel="stylesheet" href="../assets/css/loader.css" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/baccarat.css" />
  <style>
    
  </style>
</head>
<body >
  <div id="loading-overlay" class="loader">
    <svg width="100" height="100">
      <defs>
        
        <lineargradient id="lineargradient2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#49a1ff"></stop>
          <stop offset="100%" stop-color="#fff"></stop>
        </lineargradient>
      </defs>
      <g>
        <text x="0" y="19" font-size="22" font-weight="900" >BET</text>
        <text x="42" y="19" font-size="22" font-weight="900">ZONE</text>
      </g>
      <g>
        <rect id="progress" x="0" y="21"  width="0" height="3" fill="#49a1ff"/>
        <text id="progress-text" x="50%" y="50" font-size="11" font-weight="100">0%</text>
      </g>
    </svg>
     
  </div>
  <div class="wrapper">

    <video id="video"  controlsList="nodownload nofullscreen noremoteplayback" playsinline webkit-playsinline></video>
    <div class="hud">
      <div class="hud-panel">
        <svg id="beadroad" class="roadmap" preserveAspectRatio="xMidYMid meet" viewBox="0 0 420 120">
        </svg>
      </div>
      <div class="hud-panel">
        <svg id="betting" class="betting" preserveAspectRatio="xMidYMid meet"  viewBox="0 0 420 125">
            <defs>
            
              <lineargradient id="secondary-blue-fill" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(0, 68, 221);"></stop>
                <stop offset="100%" style="stop-color: rgb(0, 58, 136);"></stop>
              </lineargradient>
              <lineargradient id="secondary-blue-stroke" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(0, 68, 221);"></stop>
                <stop offset="100%" style="stop-color: rgb(0, 58, 136);"></stop>
              </lineargradient>

              
              <lineargradient id="secondary-green-fill" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(138, 88, 52);"></stop>
                <stop offset="100%" style="stop-color: rgb(109, 67, 37);"></stop>
              </lineargradient>
              <lineargradient id="secondary-green-stroke" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(138, 88, 52);"></stop>
                <stop offset="100%" style="stop-color: rgb(109, 67, 37);"></stop>
              </lineargradient>

              <lineargradient id="secondary-red" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="44%" stop-color="#7D070F"></stop>
                <stop offset="100%" stop-color="#B52B35"></stop>
              </lineargradient>
              <lineargradient id="secondary-red-fill" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(236, 0, 0);"></stop>
                <stop offset="100%" style="stop-color: rgb(189, 0, 0);"></stop>
              </lineargradient>
              <lineargradient id="secondary-red-stroke" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" style="stop-color: rgb(255, 37, 37);"></stop>
              </lineargradient>
             
            </defs>
            <!-- LEFT -->
            <g class="place-bet" id="p-pair">
              <rect  x="0" y="0" width="100" height="39" rx="3"  fill="url(#secondary-blue-fill)" stroke="url(#secondary-blue-stroke)" class="bet bet-left" />
              <text x="50" y="20" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">P PAIR</text>
            </g>
            <g class="place-bet" id="p-bonus">
              <rect x="0" y="42" width="100" height="39" rx="3"  fill="url(#secondary-blue-fill)" stroke="url(#secondary-blue-stroke)" class="bet bet-left" />
              <text x="50"  y="61.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">P BONUS </text>
            </g>
            <g class="place-bet" id="perfect-pair">
              <rect  x="0" y="84.5" width="100" height= "39" rx="3"  fill="url(#secondary-green-fill)" stroke="url(#secondary-green-stroke)" class="bet bet-left" />
              <text x="50" y="107" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">PERFECT PAIR</text>
            </g>

            <!-- MIDDLE 214-->
            <g class="place-bet" id="player">
              <rect x="103" y="0" width="105" height="124" rx="3"  fill="url(#secondary-blue-fill)" stroke="url(#secondary-blue-stroke)" class="bet bet-left" />
              <text x="154" y="20" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700" fill="#fff">PLAYER</text>
            </g>
            <g class="place-bet" id="banker">
              <rect x="211" y="0" width="105" height="124" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="266" y="20" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700" fill="#fff">BANKER</text>
            </g>

            <!-- RIGHT -->
            <g class="place-bet" id="b-pair">
              <rect x="320" y="0" width="100" height="39" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="371" y="20" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">B PAIR</text>
            </g>
            <g class="place-bet" id="b-bonus">
              <rect x="320" y="42" width="100" height="39" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="371" y="61.5" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">B BONUS </text>
            </g>
            <g class="place-bet" id="either-pair">
              <rect  x="320" y="84.5" width="100" height= "39" rx="3"  fill="url(#secondary-green-fill)" stroke="url(#secondary-green-stroke)" class="bet bet-left" />
              <text x="371" y="107" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">EITHER PAIR</text>
            </g>
            
             <!-- <g class="place-bet" id="b-pair">
              <rect x="306" y="0" width="100" height="39" rx="3"  fill="url(#secondary-red-fill)" stroke="url(#secondary-red-stroke)" class="bet bet-left" />
              <text x="306" y="20" font-size="11" font-weight="700" fill="#fff">B PAIR</text>
            </g> -->
           
        </svg> 
      </div>
      <div class="hud-panel">
        <svg id="fourroad" class="roadmap" preserveAspectRatio="xMidYMid meet"  viewBox="0 0 420 120">
        </svg>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="/assets/js/hud.js"></script>
  <script src="/assets/js/main.js"></script>
   
  </script>
</body>
</html>
