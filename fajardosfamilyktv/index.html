<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fajardo's Family KTV — Rooms &amp; Rates</title>
  <meta name="description"
    content="Fajardo's Family KTV — pick a room and see live availability and rates at our Dasmariñas branch. Pocket, Family, and Corporate KTV rooms available now.">
  <meta name="keywords"
    content="Fajardo's Family KTV, KTV Dasmariñas, karaoke bar Cavite, private KTV rooms, family KTV rates">
  <meta name="author" content="Fajardo's Family KTV">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="business.business">
  <meta property="og:title" content="Fajardo's Family KTV — Rooms &amp; Rates">
  <meta property="og:description"
    content="Pick a room and see rates at our Dasmariñas branch.">
  <meta property="og:image" content="img/ktv-banner.jpg">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NightClub",
    "name": "Fajardo's Family KTV",
    "slogan": "Just Sing or Celebrate!",
    "image": "img/ktv-banner.jpg",
    "priceRange": "₱₱",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Arkansas St, Manuelaville Subd, Burol, Main Dr",
      "addressLocality": "Dasmariñas",
      "addressRegion": "Cavite",
      "postalCode": "4114",
      "addressCountry": "PH"
    },
    "telephone": "+63-912-345-6789",
    "openingHours": "Mo-Su 10:00-02:00"
  }
  </script>
</head>

<body>
  <main class="carousel-page">
    <h1 class="sr-only">Fajardo's Family KTV — Rooms and Rates</h1>
    <div class="page-header">
      <a class="page-link back-link" href="https://dandeliongourmet.lenzstudio.dev/#fajardosfamilyktv" target="_top">&larr; Dandelion Gourmet</a>
      <a class="page-logo-link" target="_parent" href="https://fajardosfamilyktv.lenzstudio.dev/">
        <img class="page-logo" src="img/ktv-logo.png" alt="Fajardo's Family KTV">
      </a>
      <nav class="view-switcher" aria-label="Select view">
        <input type="radio" name="view-mode" id="view-carousel" class="sr-only" checked>
        <input type="radio" name="view-mode" id="view-grid" class="sr-only">
        <label for="view-carousel" class="switch-tab">&#9673; Carousel</label>
        <label for="view-grid" class="switch-tab">&#9638; Grid</label>
      </nav>
    </div>

    <div class="branch-view" data-branch="main">
      <div class="carousel-stage">
        <button type="button" class="carousel-arrow prev" aria-label="Previous room">&#10094;</button>

        <div class="carousel-track">

          <button type="button" class="carousel-card" data-room="pocket-main" data-pos="active"
            aria-current="true" style="--accent:#e21f83">
            <span class="card-status is-occupied"><span class="status-dot"></span>Occupied &middot; 25 min
              left</span>
            <img class="card-photo" src="img/rooms/pocket.jpg" alt="Pocket Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Pocket Room</span>
              <span class="card-pax">2–4 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>2,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;500</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="family-main" data-pos="next"
            aria-current="false" style="--accent:#7b2ff0">
            <span class="card-status is-available"><span class="status-dot"></span>Available Now</span>
            <img class="card-photo" src="img/rooms/family.jpg" alt="Family Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Family Room</span>
              <span class="card-pax">5–8 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>3,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;700</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="corporate-main" data-pos="prev"
            aria-current="false" style="--accent:#ff6d45">
            <span class="card-status is-occupied"><span class="status-dot"></span>Occupied &middot; 1h 10m
              left</span>
            <img class="card-photo" src="img/rooms/corporate.jpg" alt="Corporate Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Corporate Room</span>
              <span class="card-pax">10–22 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>4,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;900</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

        </div>

        <button type="button" class="carousel-arrow next" aria-label="Next room">&#10095;</button>
      </div>
    </div>

    <a class="page-link" href="grid-menu.html">View Full Menu &amp; Rates &rarr;</a>
  </main>

  <script src="js/home.js" defer></script>
</body>

</html>
