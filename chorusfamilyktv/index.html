<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chorus Family KTV — Rooms &amp; Rates</title>
  <meta name="description"
    content="Chorus Family KTV — pick a room and see live availability and rates at our Robinsons Las Piñas branch. 7 KTV room options from Couple to Grand, available now.">
  <meta name="keywords"
    content="Chorus Family KTV, KTV Las Piñas, karaoke bar Las Piñas, private KTV rooms, family KTV rates, Robinsons Las Piñas KTV">
  <meta name="author" content="Chorus Family KTV">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="business.business">
  <meta property="og:title" content="Chorus Family KTV — Rooms &amp; Rates">
  <meta property="og:description"
    content="Pick a room and see live availability and rates at our Robinsons Las Piñas branch.">
  <meta property="og:image" content="img/ktv-logo.png">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NightClub",
    "name": "Chorus Family KTV",
    "slogan": "Sing Your Heart Out!",
    "image": "img/ktv-logo.png",
    "priceRange": "₱₱",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Robinsons Place Alabang Zapote Road, Talon I",
      "addressLocality": "Las Piñas",
      "postalCode": "1747",
      "addressCountry": "PH"
    },
    "telephone": "+63-921-855-7454",
    "openingHours": "Mo-Su 10:00-02:00"
  }
  </script>
</head>

<body>
  <main class="carousel-page">
    <h1 class="sr-only">Chorus Family KTV — Rooms and Rates</h1>
    <div class="page-header">
      <a class="page-link back-link" href="https://dandeliongourmet.lenzstudio.dev/#chorusfamilyktv" target="_top">&larr; Dandelion Gourmet</a>
      <a class="page-logo-link" target="_parent" href="https://chorusfamilyktv.lenzstudio.dev/">
        <img class="page-logo" src="img/ktv-logo.png" alt="Chorus Family KTV">
      </a>
      <nav class="view-switcher" aria-label="Select view">
        <input type="radio" name="view-mode" id="view-carousel" class="sr-only" checked>
        <input type="radio" name="view-mode" id="view-grid" class="sr-only">
        <label for="view-carousel" class="switch-tab">&#9673; Carousel</label>
        <label for="view-grid" class="switch-tab">&#9638; Grid</label>
      </nav>
    </div>

    <div class="branch-view" data-branch="laspinas">
      <div class="carousel-stage">
        <button type="button" class="carousel-arrow prev" aria-label="Previous room">&#10094;</button>

        <div class="carousel-track">

          <button type="button" class="carousel-card" data-room="couple" data-pos="active"
            aria-current="true" style="--accent:#ff6fae">
            <span class="card-status is-available"><span class="status-dot"></span>Available Now</span>
            <img class="card-photo" src="img/rooms/pocket.jpg" alt="Couple Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Couple Room</span>
              <span class="card-pax">2 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>1,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;400</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="pocket" data-pos="next"
            aria-current="false" style="--accent:#e21f83">
            <span class="card-status is-occupied"><span class="status-dot"></span>Occupied &middot; 20 min
              left</span>
            <img class="card-photo" src="img/rooms/pocket.jpg" alt="Pocket Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Pocket Room</span>
              <span class="card-pax">2–4 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>2,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;500</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="family" data-pos="prev"
            aria-current="false" style="--accent:#a83fe0">
            <span class="card-status is-available"><span class="status-dot"></span>Available Now</span>
            <img class="card-photo" src="img/rooms/family.jpg" alt="Family Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Family Room</span>
              <span class="card-pax">5–8 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>3,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;700</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="group" data-pos="prev"
            aria-current="false" style="--accent:#7b5cff">
            <span class="card-status is-occupied"><span class="status-dot"></span>Occupied &middot; 45 min
              left</span>
            <img class="card-photo" src="img/rooms/family.jpg" alt="Group Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Group Room</span>
              <span class="card-pax">9–14 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>4,499<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;800</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="party" data-pos="prev"
            aria-current="false" style="--accent:#5b9bd5">
            <span class="card-status is-available"><span class="status-dot"></span>Available Now</span>
            <img class="card-photo" src="img/rooms/corporate.jpg" alt="Party Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Party Room</span>
              <span class="card-pax">15–20 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>5,499<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;950</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="corporate" data-pos="prev"
            aria-current="false" style="--accent:#3fb0e0">
            <span class="card-status is-occupied"><span class="status-dot"></span>Occupied &middot; 1h 05m
              left</span>
            <img class="card-photo" src="img/rooms/corporate.jpg" alt="Corporate Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Corporate Room</span>
              <span class="card-pax">21–30 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>6,499<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;1,100</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

          <button type="button" class="carousel-card" data-room="grand" data-pos="prev"
            aria-current="false" style="--accent:#ff6d45">
            <span class="card-status is-available"><span class="status-dot"></span>Available Now</span>
            <img class="card-photo" src="img/rooms/corporate.jpg" alt="Grand Room interior" draggable="false">
            <span class="card-info">
              <span class="card-name">Grand Room</span>
              <span class="card-pax">31–40 Pax</span>
              <span class="card-price"><span class="check" aria-hidden="true">&#10003;</span>7,999<small>PHP /
                  4hrs</small></span>
              <span class="card-rate">Hourly <strong>&#8369;1,300</strong><small>/hr</small></span>
            </span>
            <span class="card-expand-hint">Tap to view full screen</span>
            <span class="card-close" aria-hidden="true">&times; Tap to minimize</span>
          </button>

        </div>

        <button type="button" class="carousel-arrow next" aria-label="Next room">&#10095;</button>
      </div>
    </div>

    <a class="page-link" href="grid-menu.html">View Full Menu &amp; Rates &rarr;</a>
  </main>

  <script src="js/home.js" defer></script>
</body>

</html>
